<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تواصل معي  - YOUSEF SHAABAN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease-in-out;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #020617 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Roboto', sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة خفيفة (فقط للجمال) */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(37, 99, 235, 0.15), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* شريط التنقل الاحترافي */
        .nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            list-style: none;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 0.8rem 2rem;
            margin-bottom: 3rem;
            border: 1px solid rgba(59, 130, 246, 0.4);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 10;
            flex-wrap: wrap;
        }

        .nav-bar a {
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            background: transparent;
            color: #e2e8f0;
            letter-spacing: 0.5px;
            transition: 0.2s;
            display: inline-block;
        }

        .nav-bar a:hover {
            background: #3b82f6;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 6px 14px rgba(59, 130, 246, 0.4);
        }

        /* البطاقة الرئيسية - Glassmorphism */
        .glass-card {
            max-width: 650px;
            margin: 1rem auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2rem 2rem 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            z-index: 5;
        }

        .glass-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 32px 55px rgba(0, 0, 0, 0.4);
            border-color: rgba(59, 130, 246, 0.6);
        }

        h2 {
            font-size: 2.5rem;
            background: linear-gradient(120deg, #ffffff, #a5f3fc, #38bdf8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #cbd5e1;
            margin-bottom: 2rem;
            font-size: 1rem;
            border-bottom: 1px dashed #334155;
            display: inline-block;
            padding-bottom: 6px;
        }

        /* حقول الإدخال */
        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.45);
            border: 1.5px solid #334155;
            border-radius: 28px;
            padding: 14px 22px;
            margin: 10px 0;
            font-size: 1rem;
            color: #f1f5f9;
            font-family: inherit;
            outline: none;
            transition: all 0.25s;
            resize: vertical;
        }

        input:focus, textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
            background: rgba(0, 0, 0, 0.6);
        }

        input::placeholder, textarea::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        textarea {
            min-height: 120px;
            border-radius: 28px;
        }

        /* زر الإرسال الاحترافي */
        button {
            background: linear-gradient(95deg, #2563eb, #1e40af);
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 14px 28px;
            border-radius: 44px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            transition: 0.2s;
            letter-spacing: 0.8px;
            font-family: inherit;
        }

        button:hover {
            background: linear-gradient(95deg, #3b82f6, #2563eb);
            transform: scale(1.01);
            box-shadow: 0 12px 28px rgba(37, 99, 235, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        /* رسالة النجاح أو الخطأ */
        .feedback-msg {
            margin-top: 20px;
            padding: 12px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.9rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }

        .success {
            color: #a3e635;
            border-right: 4px solid #a3e635;
            background: rgba(163, 230, 53, 0.1);
        }

        .error {
            color: #f87171;
            border-right: 4px solid #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        /* تذييل صغير */
        .footer-note {
            text-align: center;
            margin-top: 2rem;
            color: #5b6e8c;
            font-size: 0.8rem;
        }

        /* جعل التصميم متجاوب */
        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }
            .glass-card {
                padding: 1.5rem;
            }
            h2 {
                font-size: 1.9rem;
            }
            .nav {
                gap: 0.8rem;
                padding: 0.6rem 1rem;
            }
            .nav-bar a {
                padding: 0.3rem 0.9rem;
                font-size: 0.9rem;
            }
        }

        /* تأثير ظهور العناصر (Animate on load) */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-card, .nav {
            animation: fadeUp 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }
    </style>
</head>
<body>

    <ul class="nav">
        <li class="nav-bar"><a href="skills.html">🎯 المهارات</a></li>
        <li class="nav-bar"><a href="contact.html" style="background: #3b82f6; color: white;">📞 تواصل</a></li>
        <li class="nav-bar"><a href="index.html">🏠 الرئيسية</a></li>
    </ul>

    <div class="glass-card">
        <h2>📬 تواصل معي</h2>
        <div class="subtitle">لنصنع شيئاً مميزاً معاً — مرحباً بك في عالمي </div>

        <!-- نموذج الاتصال -->
        <form id="contactForm" action="#" method="post">
            <input type="text" id="fullName" placeholder="الاسم الكامل *" required>
            <input type="email" id="emailAddress" placeholder="البريد الإلكتروني *" required>
            <input type="password" id="userPassword" placeholder="كلمة المرور (اختياري)">
            <textarea id="messageContent" placeholder="اكتب رسالتك هنا ... *" required></textarea>
            <button type="submit" id="sendBtn">✨ إرسال الرسالة ✨</button>
        </form>

        <div id="formFeedback" class="feedback-msg"></div>
    </div>
    <div class="footer-note">
        © 2025 محفظتي الاحترافية | نتطلع للتعاون مع Google 🌟
    </div>

    <script>
        (function() {
            // انتظار تحميل DOM بالكامل
            const form = document.getElementById('contactForm');
            const nameInput = document.getElementById('fullName');
            const emailInput = document.getElementById('emailAddress');
            const messageInput = document.getElementById('messageContent');
            const feedbackDiv = document.getElementById('formFeedback');

            // دالة عرض الرسائل التفاعلية
            function showFeedback(message, type = 'success') {
                feedbackDiv.innerHTML = message;
                feedbackDiv.classList.remove('success', 'error');
                feedbackDiv.classList.add(type);
                // جعل الرسالة تختفي تلقائياً بعد 4 ثواني
                setTimeout(() => {
                    if (feedbackDiv) {
                        feedbackDiv.classList.remove('success', 'error');
                        feedbackDiv.innerHTML = '';
                    }
                }, 4000);
            }

            // دالة التحقق من البريد الإلكتروني (Regex احترافي)
            function isValidEmail(email) {
                const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                return emailRegex.test(email);
            }

            // دالة التحقق من الاسم (يجب ألا يكون فارغاً وألا يحتوي على أرقام فقط)
            function isValidName(name) {
                const trimmed = name.trim();
                if (trimmed.length < 2) return false;
                // يمكن أن يحتوي على أحرف عربية أو إنجليزية ومسافات
                const nameRegex = /^[a-zA-Z\u0600-\u06FF\s']{2,50}$/;
                return nameRegex.test(trimmed);
            }

            // دالة تحقق من صحة الرسالة
            function isValidMessage(msg) {
                const trimmed = msg.trim();
                return trimmed.length >= 5 && trimmed.length <= 1000;
            }

            // معالج الإرسال (محاكاة إرسال احترافية مع تخزين محلي)
            function handleFormSubmit(event) {
                event.preventDefault(); // منع إعادة تحميل الصفحة

                // جلب القيم مع تنظيفها
                const nameValue = nameInput.value;
                const emailValue = emailInput.value;
                const passwordValue = document.getElementById('userPassword').value;
                const messageValue = messageInput.value;

                // 1. التحقق من الاسم
                if (!isValidName(nameValue)) {
                    showFeedback('❌ الاسم يجب أن يكون حروفاً حقيقية (عربية أو إنجليزية) وألا يقل عن حرفين.', 'error');
                    nameInput.focus();
                    nameInput.style.borderColor = '#f87171';
                    setTimeout(() => { nameInput.style.borderColor = '#334155'; }, 1500);
                    return;
                }

                // 2. التحقق من البريد الإلكتروني
                if (!isValidEmail(emailValue)) {
                    showFeedback('⚠️ بريد إلكتروني غير صالح! مثال صحيح: name@domain.com', 'error');
                    emailInput.focus();
                    emailInput.style.borderColor = '#f87171';
                    setTimeout(() => { emailInput.style.borderColor = '#334155'; }, 1500);
                    return;
                }

                // 3. التحقق من الرسالة
                if (!isValidMessage(messageValue)) {
                    showFeedback('✏️ الرسالة قصيرة جداً! يرجى كتابة 5 أحرف على الأقل.', 'error');
                    messageInput.focus();
                    messageInput.style.borderColor = '#f87171';
                    setTimeout(() => { messageInput.style.borderColor = '#334155'; }, 1500);
                    return;
                }

                // ----- بعد نجاح التحقق -----
                // إضافة تأثير تحميل وهمي للزر
                const sendButton = document.getElementById('sendBtn');
                const originalButtonText = sendButton.innerHTML;
                sendButton.innerHTML = '⏳ جاري الإرسال ...';
                sendButton.disabled = true;

                // محاكاة طلب إلى خادم (مثل fetch) ولكن نستخدم setTimeout لإظهار الاحترافية
                setTimeout(() => {
                    // هنا نقوم بتخزين البيانات في localStorage بشكل آمن (محاكاة لإرسال نموذج)
                    const contactData = {
                        fullName: nameValue.trim(),
                        email: emailValue,
                        message: messageValue.trim(),
                        timestamp: new Date().toISOString(),
                        // لا نخزن كلمة المرور لأسباب أمنية، لكن يمكن تجاهلها
                    };

                    // حفظ آخر محادثة في LocalStorage (محاكاة سجل التواصل)
                    let messagesHistory = localStorage.getItem('portfolio_contacts');
                    let historyArray = [];
                    if (messagesHistory) {
                        try {
                            historyArray = JSON.parse(messagesHistory);
                        } catch(e) { historyArray = []; }
                    }
                    historyArray.push(contactData);
                    // نحتفظ فقط بآخر 5 محادثات للتجربة
                    if (historyArray.length > 5) historyArray.shift();
                    localStorage.setItem('portfolio_contacts', JSON.stringify(historyArray));

                    // إعادة تعيين الزر
                    sendButton.innerHTML = originalButtonText;
                    sendButton.disabled = false;

                    // عرض رسالة نجاح بلمسة أنيقة
                    showFeedback(`✅ تم إرسال رسالتك بنجاح يا ${nameValue.trim()}! سأتواصل معك قريباً على بريد ${emailValue}. شكراً لثقتك 🤝`, 'success');
                    
                    // تفريغ الحقول (اختياري مع الاحتفاظ بالاسم قليلاً)
                    nameInput.value = '';
                    emailInput.value = '';
                    messageInput.value = '';
                    // لا نفرغ كلمة المرور احتراماً للخصوصية يمكن تركها
                    document.getElementById('userPassword').value = '';

                    // إضافة تأثير vibrate خفيف للمتصفحات التي تدعم (اختياري)
                    if (navigator.vibrate) navigator.vibrate(50);
                    
                    // اختياري: إعادة تعيين حدود الحقول
                    [nameInput, emailInput, messageInput].forEach(inp => {
                        inp.style.borderColor = '#334155';
                    });

                    // يمكنك أيضاً تسجيل في الكونسول (للمطور)
                    console.log('📩 تم إرسال رسالة جديدة:', contactData);
                    
                }, 800); // تأخير قصير لمحاكاة اتصال الشبكة
            }

            // ربط الحدث مع النموذج
            if (form) {
                form.addEventListener('submit', handleFormSubmit);
            }

            // إضافة تأثيرات فورية عند الكتابة (تحسين UX)
            const allFields = [nameInput, emailInput, messageInput];
            allFields.forEach(field => {
                if (field) {
                    field.addEventListener('input', function() {
                        // إعادة تعيين الحدود الحمراء عند الكتابة
                        this.style.borderColor = '#3b82f6';
                        setTimeout(() => {
                            if (document.activeElement !== this) {
                                this.style.borderColor = '#334155';
                            }
                        }, 800);
                    });
                }
            });

            // إضافة تحقق فوري للبريد عند الخروج من الحقل
            if (emailInput) {
                emailInput.addEventListener('blur', function() {
                    const val = this.value;
                    if (val !== '' && !isValidEmail(val)) {
                        showFeedback('📧 يرجى كتابة بريد إلكتروني صحيح (مثل: name@example.com)', 'error');
                        this.style.borderColor = '#f87171';
                    } else {
                        this.style.borderColor = '#334155';
                    }
                });
            }

            // تحسين تجربة زر الإرسال عند الضغط على Enter في الحقول
            const formInputs = document.querySelectorAll('#contactForm input, #contactForm textarea');
            formInputs.forEach(input => {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
                        e.preventDefault();
                        // ننتقل إلى الحقل التالي
                        const formElements = Array.from(form.elements).filter(el => el.tagName !== 'BUTTON');
                        const currentIndex = formElements.indexOf(e.target);
                        if (currentIndex !== -1 && currentIndex + 1 < formElements.length) {
                            formElements[currentIndex + 1].focus();
                        } else if (currentIndex + 1 === formElements.length) {
                            // إذا كان آخر حقل نضغط إرسال
                            form.dispatchEvent(new Event('submit'));
                        }
                    } else if (e.key === 'Enter' && e.target.tagName === 'TEXTAREA') {
                        // في textarea لا نمنع حتى يتمكن المستخدم من سطر جديد
                        // لكن Ctrl+Enter يمكن أن يرسل (ميزة إضافية)
                        if (e.ctrlKey) {
                            e.preventDefault();
                            form.dispatchEvent(new Event('submit'));
                        }
                    }
                });
            });

            // رسالة ترحيب صغيرة في console تعكس الروح الاحترافية
            console.log('%c✨ تم تحميل صفحة التواصل الاحترافية | جاهز لتقديم محفظة لمستوى Google ✨', 'color: #3b82f6; font-size: 16px; font-weight: bold;');
        })();
    </script>
</body>
</html>
